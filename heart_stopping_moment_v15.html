
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 2304px; height: 1024px; overflow: hidden; background: #000; }
canvas { display: block; }
#debugPanel {
  display: none; position: fixed; top: 0; left: 0; right: 0;
  background: rgba(10,10,10,0.96); border-bottom: 1px solid #2a2a2a;
  padding: 14px 20px; z-index: 9999;
  font-family: monospace; font-size: 13px; color: #888;
  align-items: center; gap: 16px;
}
#debugPanel.visible { display: flex; }
#debugPanel label { color: #555; font-size: 11px; letter-spacing: 1px; }
#debugPanel input {
  background: #111; border: 1px solid #333; color: #ccc;
  padding: 5px 10px; border-radius: 4px; font-family: monospace;
  font-size: 12px; width: 220px; outline: none;
}
#debugPanel input:focus { border-color: #555; color: #fff; }
#dbConnectBtn {
  background: #1a1a1a; border: 1px solid #333; color: #888;
  padding: 5px 14px; border-radius: 4px; cursor: pointer;
  font-family: monospace; font-size: 12px;
}
#dbConnectBtn:hover { border-color: #555; color: #ccc; }
.db-status { display: flex; align-items: center; gap: 6px; }
.sse-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.sse-dot.connected    { background: #1db954; box-shadow: 0 0 4px #1db954; }
.sse-dot.disconnected { background: #252525; }
.sse-dot.connecting   { background: #f5a623; }
.db-hint { margin-left: auto; font-size: 10px; color: #333; }
</style>

<canvas id="c" width="2304" height="1024"></canvas>

<div id="debugPanel">
  <label>SERVER</label>
  <input id="dbUrlInput" type="text" spellcheck="false" />
  <button id="dbConnectBtn">Connect</button>
  <div class="db-status">
    <span class="sse-dot disconnected" id="sseDot"></span>
    <span id="sseHost" style="font-size:11px;color:#444;">–</span>
  </div>
  <div class="db-hint">` to close</div>
</div>

<script>
// ── Geometry ──────────────────────────────────────────────────────────────────
const METER_COUNT  = 8;
const BASE_LEVEL   = 10;
const CANVAS_W     = 2304;
const CANVAS_H     = 1024;
const SHELL_W      = CANVAS_W / METER_COUNT;  // 288
const SHELL_H      = CANVAS_H;
const HEADER_H     = 36;
const PAD_X = 6, PAD_Y = 6;
const SCALE_W      = 20;
const TRACK_GAP    = 4;
const SEG_GAP      = 3;

const COL_W   = Math.floor((SHELL_W - 2 - PAD_X * 2 - SCALE_W - TRACK_GAP) / 2);
const AVAIL_H = SHELL_H - HEADER_H - PAD_Y * 2;
const COL_TOP = HEADER_H + PAD_Y;

// Auto-calc segments — max density, min 8px tall
let SEGS = 1, SEG_H = AVAIL_H;
{ let n = 1;
  while (true) {
    const next = n + 1;
    if (Math.floor((AVAIL_H - (next - 1) * SEG_GAP) / next) < 8) break;
    n = next;
  }
  SEGS  = n;
  SEG_H = Math.floor((AVAIL_H - (SEGS - 1) * SEG_GAP) / SEGS);
}

// Colour table
const COLOR_HEX = new Array(SEGS);
const COLOR_RGB = new Array(SEGS);
for (let i = 0; i < SEGS; i++) {
  const t = i / (SEGS - 1);
  let r, g, b, h;
  if      (t < 0.55) { r=0;   g=224; b=64;  h='#00e040'; }
  else if (t < 0.68) { r=136; g=238; b=0;   h='#88ee00'; }
  else if (t < 0.78) { r=255; g=221; b=0;   h='#ffdd00'; }
  else if (t < 0.88) { r=255; g=136; b=0;   h='#ff8800'; }
  else               { r=255; g=24;  b=0;   h='#ff1800'; }
  COLOR_HEX[i] = h; COLOR_RGB[i] = `${r},${g},${b}`;
}
const OFF_FILL = COLOR_RGB.map(rgb => `rgba(${rgb},0.10)`);
const ON_FILL  = COLOR_RGB.map(rgb => `rgb(${rgb})`);

// Colour bands for batched drawing
const BANDS = [];
{ let s = 0;
  for (let i = 1; i <= SEGS; i++) {
    if (i === SEGS || COLOR_HEX[i] !== COLOR_HEX[s]) {
      BANDS.push({ start: s, end: i - 1, hex: COLOR_HEX[s], on: ON_FILL[s], off: OFF_FILL[s] });
      s = i;
    }
  }
}

// Segment Y positions — index 0 = bottom (green), SEGS-1 = top (red)
const segYs = new Float32Array(SEGS);
for (let i = 0; i < SEGS; i++) {
  segYs[i] = COL_TOP + AVAIL_H - (i + 1) * SEG_H - i * SEG_GAP;
}

const SCALE_LABELS = ['+12', '+8', '+4', '0', '-4', '-8', '-12'];

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── State ─────────────────────────────────────────────────────────────────────
let level      = 0;
let overcharge = 0;       // presses past BASE_LEVEL (0-4 = distortion, 5 = break)
let breaking   = false;
let breakFrame = 0;
const BREAK_TOTAL  = 100;
const BREAK_THRESH = 5;

let throbPhase = 0, throbMult = 0;
let lastIdleTime = 0, idleTick = 0;
let rafId = null;

const meterData = Array.from({ length: METER_COUNT }, () => ({
  displayA: 0, displayB: 0, idleTargetA: 0, idleTargetB: 0,
}));

function startLoop() { if (!rafId) rafId = requestAnimationFrame(masterLoop); }
function stopLoop()  { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }
function levelToSegs(lvl) { return Math.round((lvl / BASE_LEVEL) * SEGS); }

// ── Drawing ───────────────────────────────────────────────────────────────────
function drawColumn(colX, vis) {
  if (vis === 0) {
    // All OFF — one pass per band
    for (const b of BANDS) {
      ctx.fillStyle = b.off;
      for (let i = b.start; i <= b.end; i++) ctx.fillRect(colX, segYs[i], COL_W, SEG_H);
    }
    return;
  }

  const f = level / BASE_LEVEL;

  // OFF segments
  for (const b of BANDS) {
    const offStart = Math.max(b.start, vis);
    if (offStart > b.end) continue;
    ctx.fillStyle = b.off;
    for (let i = offStart; i <= b.end; i++) ctx.fillRect(colX, segYs[i], COL_W, SEG_H);
  }

  // Glow — ONE rect covering entire lit region (huge perf win vs per-segment)
  const litTop = segYs[vis - 1];
  const litBot = segYs[0] + SEG_H;
  const litH   = litBot - litTop;

  const og_s = level === BASE_LEVEL ? 6 + throbMult * 14 : 1 + f * 5;
  const og_a = level === BASE_LEVEL ? 0.06 + throbMult * 0.12 : 0.03 + f * 0.07;
  ctx.globalAlpha = og_a;
  ctx.fillStyle   = COLOR_HEX[Math.min(vis - 1, SEGS - 1)]; // colour of topmost lit seg
  ctx.fillRect(colX - og_s, litTop - og_s, COL_W + og_s * 2, litH + og_s * 2);

  const ig_s = level === BASE_LEVEL ? 2 + throbMult * 5 : 0.5 + f * 2.5;
  const ig_a = level === BASE_LEVEL ? 0.18 + throbMult * 0.32 : 0.07 + f * 0.16;
  ctx.globalAlpha = ig_a;
  ctx.fillRect(colX - ig_s, litTop - ig_s, COL_W + ig_s * 2, litH + ig_s * 2);

  // ON segments — batch by band
  ctx.globalAlpha = 1.0;
  for (const b of BANDS) {
    const bv = Math.min(b.end, vis - 1);
    if (b.start > vis - 1) break;
    ctx.fillStyle = b.on;
    for (let i = b.start; i <= bv; i++) ctx.fillRect(colX, segYs[i], COL_W, SEG_H);
  }

  // White core flash at max
  if (level === BASE_LEVEL && throbMult > 0.08) {
    ctx.globalAlpha = throbMult * 0.38;
    ctx.fillStyle   = '#ffffff';
    ctx.fillRect(colX, litTop, COL_W, litH);
    ctx.globalAlpha = 1.0;
  }
}

function drawMeter(m, md) {
  const bx = m * SHELL_W;

  // Shell background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(bx, 0, SHELL_W, SHELL_H);

  // Header
  ctx.fillStyle = '#111';
  ctx.fillRect(bx, 0, SHELL_W, HEADER_H - 1);
  ctx.fillStyle = '#1e1e1e';
  ctx.fillRect(bx, HEADER_H - 1, SHELL_W, 1);

  // Channel label
  ctx.fillStyle = '#2e2e2e';
  ctx.font = '10px Anton, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('CH ' + (m + 1), bx + SHELL_W / 2, (HEADER_H - 1) / 2);

  // Right border
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(bx + SHELL_W - 1, 0, 1, SHELL_H);

  // Scale labels
  ctx.fillStyle = '#333';
  ctx.font = '8px sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  const scaleX = bx + PAD_X + SCALE_W - 3;
  for (let i = 0; i < SCALE_LABELS.length; i++) {
    ctx.fillText(SCALE_LABELS[i], scaleX, COL_TOP + (i / (SCALE_LABELS.length - 1)) * AVAIL_H);
  }

  // Segment columns
  const colAx = bx + PAD_X + SCALE_W;
  const colBx = colAx + COL_W + TRACK_GAP;
  drawColumn(colAx, Math.round(md.displayA));
  drawColumn(colBx, Math.round(md.displayB));
}

// Overcharge flicker (levels 1–4 past max) — random corruption on top segments
function applyOverchargeFlicker() {
  const oc = overcharge;                 // 1–4
  const prob = 0.15 + oc * 0.15;        // 0.30 – 0.75 chance per frame
  if (Math.random() > prob) return;

  const numGlitches = 1 + Math.floor(Math.random() * oc * 2);
  for (let g = 0; g < numGlitches; g++) {
    const m    = Math.floor(Math.random() * METER_COUNT);
    const bx   = m * SHELL_W;
    const isB  = Math.random() < 0.5;
    const colX = bx + PAD_X + SCALE_W + (isB ? COL_W + TRACK_GAP : 0);
    const topN = Math.max(1, Math.ceil(SEGS * 0.12 * oc));
    const si   = SEGS - 1 - Math.floor(Math.random() * topN);
    ctx.globalAlpha = 0.7 + Math.random() * 0.3;
    ctx.fillStyle   = Math.random() < 0.55 ? '#ffffff' : '#ff2200';
    ctx.fillRect(colX, segYs[si], COL_W, SEG_H);
  }

  // Occasional full-width scanline glitch
  if (Math.random() < oc * 0.08) {
    const y  = Math.random() * CANVAS_H;
    const bh = 1 + Math.floor(Math.random() * 3);
    ctx.globalAlpha = 0.5 + Math.random() * 0.4;
    ctx.fillStyle   = Math.random() < 0.6 ? '#ff1800' : '#ffffff';
    ctx.fillRect(0, y, CANVAS_W, bh);
  }

  ctx.globalAlpha = 1.0;
}

// Break animation
function applyBreakEffect() {
  const t        = breakFrame / BREAK_TOTAL;          // 0→1
  const envelope = Math.sin(t * Math.PI);             // 0→1→0
  const dieT     = Math.max(0, (t - 0.55) / 0.45);   // 0 in first 55%, then 0→1

  // Horizontal tear bands
  const tearCount = 3 + Math.floor(Math.random() * 7 * envelope);
  for (let i = 0; i < tearCount; i++) {
    const y  = Math.random() * CANVAS_H;
    const bh = 1 + Math.random() * 8 * envelope;
    ctx.globalAlpha = 0.55 + Math.random() * 0.45;
    ctx.fillStyle   = Math.random() < 0.65 ? '#ff1800' : '#ffffff';
    ctx.fillRect(0, y, CANVAS_W, bh);
  }

  // Fast strobe — white
  const strobeW = Math.abs(Math.sin(breakFrame * 1.4));
  if (strobeW > 0.65 && envelope > 0.15) {
    ctx.globalAlpha = (strobeW - 0.65) / 0.35 * 0.85 * envelope;
    ctx.fillStyle   = '#ffffff';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }

  // Fast strobe — red
  const strobeR = Math.abs(Math.sin(breakFrame * 0.9 + 1.1));
  if (strobeR > 0.60 && envelope > 0.25) {
    ctx.globalAlpha = (strobeR - 0.60) / 0.40 * 0.55 * envelope;
    ctx.fillStyle   = '#cc0000';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }

  // Dying — segments going dark from top down
  if (dieT > 0) {
    const deadSegs = Math.floor(dieT * SEGS);
    for (let m = 0; m < METER_COUNT; m++) {
      const bx   = m * SHELL_W;
      const colAx = bx + PAD_X + SCALE_W;
      const colBx = colAx + COL_W + TRACK_GAP;
      ctx.fillStyle = '#0a0a0a';
      // Kill top deadSegs + random flicker on next few
      for (let i = SEGS - 1; i >= SEGS - deadSegs; i--) {
        if (i < 0) break;
        ctx.globalAlpha = 0.85 + Math.random() * 0.15;
        ctx.fillRect(colAx, segYs[i], COL_W, SEG_H);
        ctx.fillRect(colBx, segYs[i], COL_W, SEG_H);
      }
      // Flicker zone just below dead region
      const flickerSeg = SEGS - 1 - deadSegs;
      if (flickerSeg >= 0 && Math.random() < 0.6) {
        ctx.globalAlpha = Math.random() * 0.9;
        ctx.fillRect(colAx, segYs[flickerSeg], COL_W, SEG_H);
        ctx.fillRect(colBx, segYs[flickerSeg], COL_W, SEG_H);
      }
    }
  }

  // Final fade to black
  if (dieT > 0.6) {
    ctx.globalAlpha = (dieT - 0.6) / 0.4 * 0.95;
    ctx.fillStyle   = '#000000';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }

  ctx.globalAlpha = 1.0;
  breakFrame++;

  if (breakFrame >= BREAK_TOTAL) {
    breaking    = false;
    breakFrame  = 0;
    overcharge  = 0;
    level       = 0;
    throbPhase  = 0;
    throbMult   = 0;
    for (const m of meterData) m.displayA = m.displayB = m.idleTargetA = m.idleTargetB = 0;
  }
}

function drawFrame() {
  ctx.globalAlpha = 1.0;
  ctx.shadowBlur  = 0;
  ctx.fillStyle   = '#000000';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  for (let m = 0; m < METER_COUNT; m++) drawMeter(m, meterData[m]);
  if (overcharge > 0 && !breaking) applyOverchargeFlicker();
  if (breaking)                    applyBreakEffect();
}

// ── Master loop ───────────────────────────────────────────────────────────────
function masterLoop(ts) {
  rafId = null;

  // Throb — faster + more intense during break/overcharge
  if (level === BASE_LEVEL || overcharge > 0 || breaking) {
    const speed  = breaking ? 0.18 : (0.065 + overcharge * 0.025);
    throbPhase  += speed;
    const fast   = Math.sin(throbPhase * 3.1);
    const slow   = Math.sin(throbPhase * 1.1);
    const spike  = Math.pow(Math.max(0, Math.sin(throbPhase * 1.7)), 3) * 0.6;
    const raw    = fast * 0.5 + slow * 0.35 + spike + 0.15;
    // During break fade-out, reduce throb
    const dieMul = breaking ? Math.max(0, 1 - breakFrame / BREAK_TOTAL * 1.5) : 1;
    throbMult = Math.min(1, Math.max(0, raw)) * dieMul;
  }

  // Idle drift
  if (ts - lastIdleTime >= 30) {
    lastIdleTime = ts;
    idleTick++;
    if (level === BASE_LEVEL || overcharge > 0 || breaking) {
      for (const m of meterData) m.displayA = m.displayB = SEGS;
    } else {
      if (idleTick % 26 === 0) {
        const base   = levelToSegs(level);
        const jitter = level === 0 ? 0 : Math.max(1, Math.round(level * 0.22));
        const flip   = () => (Math.random() < 0.5 ? -1 : 1) * jitter * (Math.random() < 0.65 ? 1 : 0);
        for (const m of meterData) {
          m.idleTargetA = Math.max(0, Math.min(SEGS, base + flip()));
          m.idleTargetB = Math.max(0, Math.min(SEGS, base + flip()));
        }
      }
      for (const m of meterData) {
        m.displayA += (m.idleTargetA - m.displayA) * 0.2;
        m.displayB += (m.idleTargetB - m.displayB) * 0.2;
      }
    }
  }

  drawFrame();

  let alive = breaking || overcharge > 0 || level > 0;
  if (!alive) for (const m of meterData) {
    if (Math.round(m.displayA) > 0 || Math.round(m.displayB) > 0) { alive = true; break; }
  }
  if (alive) rafId = requestAnimationFrame(masterLoop);
}

// ── Level / overcharge control ────────────────────────────────────────────────
function setLevel(v) {
  level = Math.max(0, Math.min(BASE_LEVEL, v));
  if (level < BASE_LEVEL) { overcharge = 0; }
  if (level === BASE_LEVEL) {
    for (const m of meterData) m.displayA = m.displayB = m.idleTargetA = m.idleTargetB = SEGS;
  } else {
    const base = levelToSegs(level);
    for (const m of meterData) { m.idleTargetA = m.idleTargetB = base; }
    throbPhase = 0; throbMult = 0;
  }
  drawFrame();
  startLoop();
}

function pressPlus() {
  if (breaking) return;
  if (level < BASE_LEVEL) { setLevel(level + 1); return; }
  overcharge++;
  if (overcharge >= BREAK_THRESH) {
    breaking   = true;
    breakFrame = 0;
    for (const m of meterData) m.displayA = m.displayB = SEGS;
  }
  startLoop();
}

function pressMinus() {
  if (breaking) return;
  if (overcharge > 0) { overcharge--; startLoop(); return; }
  setLevel(level - 1);
}

function pressClear() {
  breaking   = false; breakFrame = 0;
  overcharge = 0;
  setLevel(0);
}

// URL param
(function () {
  const p  = new URLSearchParams(window.location.search);
  const lv = p.get('level');
  if (lv !== null && !isNaN(+lv)) { setLevel(+lv); return; }
  setLevel(0);
})();

document.fonts.ready.then(() => drawFrame());

// ── SSE + Debug panel ─────────────────────────────────────────────────────────
const DEFAULT_SERVER = '172.16.10.50:3000';
const STORAGE_KEY    = 'heartstop_server_url';
const sseDot    = document.getElementById('sseDot');
const sseHostEl = document.getElementById('sseHost');
const dbPanel   = document.getElementById('debugPanel');
const dbInput   = document.getElementById('dbUrlInput');
let sseSource = null, sseRetryTimer = null;

function setSseStatus(s) { sseDot.className = 'sse-dot ' + s; }

function connectSSE(host) {
  host = host.trim();
  clearTimeout(sseRetryTimer);
  if (sseSource) { sseSource.close(); sseSource = null; }
  setSseStatus('connecting');
  sseHostEl.textContent = host;
  localStorage.setItem(STORAGE_KEY, host);
  dbInput.value = host;
  try {
    sseSource = new EventSource('http://' + host + '/overlay/events');
    sseSource.onopen = () => setSseStatus('connected');
    sseSource.addEventListener('meter', e => {
      try {
        const d = JSON.parse(e.data);
        if (d.cmd === 'plus')  pressPlus();
        if (d.cmd === 'minus') pressMinus();
        if (d.cmd === 'clear') pressClear();
      } catch {}
    });
    sseSource.onerror = () => {
      setSseStatus('disconnected');
      sseSource.close(); sseSource = null;
      sseRetryTimer = setTimeout(() => connectSSE(dbInput.value || DEFAULT_SERVER), 4000);
    };
  } catch { setSseStatus('disconnected'); }
}

document.addEventListener('keydown', e => {
  if (e.key === '`') {
    dbPanel.classList.toggle('visible');
    if (dbPanel.classList.contains('visible')) dbInput.focus();
  }
});
document.getElementById('dbConnectBtn').addEventListener('click', () => {
  connectSSE(dbInput.value.trim() || DEFAULT_SERVER);
});
dbInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') connectSSE(dbInput.value.trim() || DEFAULT_SERVER);
});

const savedUrl = localStorage.getItem(STORAGE_KEY) || DEFAULT_SERVER;
dbInput.value = savedUrl;
connectSSE(savedUrl);
</script>
